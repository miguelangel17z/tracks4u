<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Track</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            padding: 2rem;
            font-size: 1.2rem;
            font-family: Arial, sans-serif;
        }
        form { width: 400px; }
        input, button { width: 100%; margin-bottom: 1rem; padding: 0.5rem; font-size: 1rem; }
    </style>
</head>
<body>
    <form method="post" enctype="multipart/form-data">
        <h1>Crear Track</h1>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar</button>
    </form>
</body>
</html>
