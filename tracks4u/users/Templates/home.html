<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracks4U - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'zinc': {
                            400: '#a1a1aa',
                            500: '#71717a',
                            600: '#52525b',
                            700: '#3f3f46',
                            800: '#27272a',
                            900: '#18181b',
                            950: '#09090b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        }
        
        .btn-primary {
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            box-shadow: 0 20px 25px -5px rgba(127, 29, 29, 0.7), 0 8px 10px -6px rgba(127, 29, 29, 0.7);
        }
        
        .btn-outline {
            transition: all 0.3s ease;
        }
        
        .btn-outline:hover {
            border-color: #52525b;
        }

        .fade-in {
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-zinc-950">
    <div class="relative w-full min-h-screen bg-zinc-950 overflow-hidden">
        <!-- Background Image with Overlay -->
        <div class="absolute inset-0 opacity-20">
            <img 
                src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=1920&q=80" 
                alt="Music Studio Background"
                class="w-full h-full object-cover"
            />
            <div class="absolute inset-0 bg-gradient-to-b from-zinc-950 via-zinc-950/60 to-zinc-950"></div>
        </div>

        <!-- Content -->
        <div class="relative z-10 flex flex-col items-center justify-center min-h-screen px-6 fade-in">
            <!-- Logo Section -->
            <div class="flex flex-col items-center mb-12">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-red-600 to-red-700 rounded-lg flex items-center justify-center shadow-lg shadow-red-900/50">
                        <!-- Music Icon SVG -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                            <circle cx="8" cy="18" r="4"/>
                            <path d="M12 18V2l7 4"/>
                        </svg>
                    </div>
                    <h1 class="text-5xl md:text-6xl font-bold text-white tracking-tight">
                        Tracks<span class="text-red-600">4</span>U
                    </h1>
                </div>
                <p class="text-zinc-400 text-lg md:text-xl text-center max-w-md">
                    Tu plataforma premium para samples y beats profesionales
                </p>
            </div>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 w-full max-w-md">
                <a href="{% url 'login' %}" class="flex-1 text-center bg-red-600 hover:bg-red-700 text-white h-12 text-lg shadow-lg shadow-red-900/50 btn-primary rounded-md flex items-center justify-center font-medium">
                    Login
                </a>
                <a href="{% url 'register' %}" class="flex-1 text-center border-2 border-zinc-700 bg-zinc-900/50 hover:bg-zinc-800 text-white h-12 text-lg backdrop-blur-sm btn-outline rounded-md flex items-center justify-center font-medium">
                    Register
                </a>
            </div>

            <!-- Additional Info -->
            <div class="mt-16 flex flex-wrap justify-center gap-8 text-zinc-500 text-sm">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-red-600 rounded-full"></div>
                    <span>Premium Quality</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-red-600 rounded-full"></div>
                    <span>Instant Download</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-red-600 rounded-full"></div>
                    <span>Best Music in the Market</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
