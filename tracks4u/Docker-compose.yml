version: "3.9"

services:

  django_web:
    build: .
    volumes:
      - .:/app
    expose:
      - "8000"

  flask_licensing:
    build: ./flask_licensing
    volumes:
      - ./flask_licensing:/app
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - django_web
      - flask_licensing