server {
    listen 80;

    # Todo lo demás va a Django
    location / {
        proxy_pass http://django_web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # El módulo estrangulado va a Flask
    location /api/v2/licensing/ {
        proxy_pass http://flask_licensing:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}